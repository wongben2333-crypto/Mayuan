<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>二十四节气 - 雅致年轮月历</title>
    <style>
        :root {
            --color-primary: #97A87A;    
            --color-secondary: #A8BBA3;  
            --color-background: #FCF9EA; 
            --color-bg-dark: #F2EEDA;
            --color-accent: #FFA239;    
            --color-text-main: #FFFFFF; 
            --color-gray: #889670;
            --bg-decoration: #f8f6f0;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at 75% 50%, var(--color-background) 0%, var(--color-bg-dark) 100%);
            font-family: "PingFang SC", "Hiragino Sans GB", "STHeiti", 'STSong', 'SimSun', serif;
            display: flex;
            color: var(--color-primary);
            overflow: hidden;
        }

        /* --- 左侧面板 --- */
        .left-panel {
            width: 38%;
            padding: 40px 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            z-index: 10;
        }

        .header h1 { font-size: 3rem; margin: 0; letter-spacing: 15px; font-weight: 300; }
        .header .subtitle { font-size: 0.9rem; letter-spacing: 4px; color: var(--color-secondary); margin-bottom: 40px; }

        .calendar-box {
            background: rgba(255, 255, 255, 0.4);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(151, 168, 122, 0.1);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        .cal-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--color-secondary);
            padding-bottom: 10px;
        }

        .cal-month { font-size: 1.8rem; font-weight: bold; }
        .cal-year { font-size: 1.2rem; opacity: 0.7; }

        .cal-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
            text-align: center;
        }

        .weekday { font-size: 0.8rem; font-weight: bold; color: var(--color-secondary); padding-bottom: 10px; }
        
        .day {
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 12px;
            font-size: 1.1rem;
            transition: all 0.3s;
            position: relative;
            background: rgba(255, 255, 255, 0.3);
        }

        .day.today { outline: 2px solid var(--color-primary); background: #fff; }
        .day.is-term {
            background-color: var(--color-accent) !important;
            color: white;
            box-shadow: 0 4px 10px rgba(255, 162, 57, 0.4);
        }

        .term-label-cal { font-size: 0.6rem; margin-top: 2px; position: absolute; bottom: 4px; }

        /* --- 右侧面板 --- */
        .right-panel {
            width: 62%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .wheel-container {
            position: relative;
            width: 85vmin;
            height: 85vmin;
            max-width: 750px;
            max-height: 750px;
            display: flex;
            justify-content: center;
            align-items: center;
            top: 20px; /* 1. 圆环整体下移 */
        }

        #wheel-svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 15px 30px rgba(0,0,0,0.08));
            overflow: visible;
        }

        .term-sector {
            transition: transform 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            cursor: pointer;
            stroke: none;
            outline: none;
            transform: translate(0,0);
            will-change: transform;
        }

        .term-label-wheel {
            position: absolute;
            pointer-events: auto; 
            cursor: pointer;
            text-align: center;
            transition: transform 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            z-index: 10;
            user-select: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 60px;
            will-change: transform;
        }

        .term-name-wheel { 
            font-size: 1.8vmin; 
            font-weight: bold; 
            color: #4a4a4a; 
            margin-bottom: 2px;
        }
        .term-date-wheel { 
            font-size: 1.1vmin; 
            color: #7a7a7a; 
            font-family: 'Arial', sans-serif;
        }

        .active-wheel .term-name-wheel { color: #222; text-shadow: 0 0 1px rgba(0,0,0,0.2); }

        .center-group {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: #fff;
            width: 36vmin;
            height: 36vmin;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.02);
            pointer-events: none;
            border: 1px solid #f0eee8;
        }

        .center-title {
            font-size: 4.5vmin;
            color: #333;
            font-weight: bold;
            letter-spacing: 10px;
            margin-left: 10px;
        }

        .center-subtitle {
            font-size: 1.5vmin;
            color: #999;
            margin-top: 10px;
            letter-spacing: 2px;
        }

        /* --- 诗词显示区域 --- */
        .poetry-container {
            margin-top: -10px; /* 2. 诗词位置上移 */
            height: 60px; 
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 5;
        }

        #poetry-display {
            font-size: 1.4rem;
            color: #555;
            font-family: 'STSong', 'SimSun', serif;
            letter-spacing: 3px;
            opacity: 0; 
            transition: opacity 0.4s ease-in-out;
            text-align: center;
            border-bottom: 1px solid rgba(151, 168, 122, 0.2);
            padding-bottom: 5px;
            min-width: 300px;
        }
    </style>
</head>
<body>

    <div class="left-panel">
        <div class="header">
            <h1>二十四节气</h1>
            <div class="subtitle">TIMELESS CALENDAR</div>
        </div>

        <div class="calendar-box">
            <div class="cal-header">
                <div class="cal-month" id="display-month">4月</div>
                <div class="cal-year" id="display-year">2026年</div>
            </div>
            <div class="cal-grid" id="calendar-days">
                <div class="weekday">一</div><div class="weekday">二</div><div class="weekday">三</div>
                <div class="weekday">四</div><div class="weekday">五</div><div class="weekday">六</div><div class="weekday">日</div>
            </div>
        </div>
    </div>

    <div class="right-panel">
        <div class="wheel-container">
            <svg id="wheel-svg" viewBox="0 0 400 400">
                <g id="sectors-container"></g>
            </svg>
            <div id="labels-container"></div>
            <div class="center-group">
                <div class="center-title">廿四节气</div>
                <div class="center-subtitle">2026 · 岁月流转</div>
            </div>
        </div>
        <div class="poetry-container">
            <div id="poetry-display"></div>
        </div>
    </div>

    <script>
        const solarTerms = [
            { name: '立春', m: 1, d: 4 }, { name: '雨水', m: 1, d: 18 }, { name: '惊蛰', m: 2, d: 5 },
            { name: '春分', m: 2, d: 20 }, { name: '清明', m: 3, d: 4 }, { name: '谷雨', m: 3, d: 20 },
            { name: '立夏', m: 4, d: 5 }, { name: '小满', m: 4, d: 20 }, { name: '芒种', m: 5, d: 5 },
            { name: '夏至', m: 5, d: 21 }, { name: '小暑', m: 6, d: 7 }, { name: '大暑', m: 6, d: 22 },
            { name: '立秋', m: 7, d: 7 }, { name: '处暑', m: 7, d: 23 }, { name: '白露', m: 8, d: 7 },
            { name: '秋分', m: 8, d: 22 }, { name: '寒露', m: 9, d: 8 }, { name: '霜降', m: 9, d: 23 },
            { name: '立冬', m: 10, d: 7 }, { name: '小雪', m: 10, d: 22 }, { name: '大雪', m: 11, d: 7 },
            { name: '冬至', m: 11, d: 21 }, { name: '小寒', m: 0, d: 5 }, { name: '大寒', m: 0, d: 20 }
        ];

        const poetryData = {
            "立春": ["立春后五日，春态已撩人。", "律回岁晚冰霜少，春到人间草木知。", "东风带雨逐西风，点滴立春映照中。"],
            "雨水": ["雨水洗春容，平田已见龙。", "随风潜入夜，润物细无声。", "天街小雨润如酥，草色遥看近却无。"],
            "惊蛰": ["微雨众卉新，一雷惊蛰始。", "惊蛰未闻雷出地，丰收有望看春耕。", "浮云不肯留，惊蛰忽已过。"],
            "春分": ["仲春初九日，春色正春分。", "溪边风物已春分，画戟森森静不闻。", "日月阳阴两均天，玄鸟不辞桃花寒。"],
            "清明": ["清明时节雨纷纷，路上行人欲断魂。", "燕子来时新社，梨花落后清明。", "素衣莫起风尘叹，犹及清明可到家。"],
            "谷雨": ["正好清明连谷雨，一杯香茗暂留客。", "谷雨收寒，茶烟飏晓，又是清明时候。", "谷雨初晴，燕子飞归。"],
            "立夏": ["槐柳阴初密，帘栊暑尚微。", "立夏微风起，江河水色新。", "别院深深夏席清，石榴开遍透帘明。"],
            "小满": ["小满赶天晴，动车响不停。", "枇杷黄后杨梅紫，正是河豚欲上时。", "小满江河满，麦收指日待。"],
            "芒种": ["乙酉甲申雷雨惊，乘潮香稻立芒种。", "芒种才过雪不霁，伊人隔岸在何方。", "连夜收麦趁天晴，芒种时节最繁忙。"],
            "夏至": ["昼晷已云极，宵漏自此长。", "夏至一阴生，稍觉凉吟入。", "东边日出西边雨，道是无晴却有晴.。"],
            "小暑": ["倏忽温风至，因循小暑来。", "熏风愠解引新凉，小暑催红荔枝香。", "荷风送香气，竹露滴清响。"],
            "大暑": ["赫赫炎晖翠幕重，大暑运金风。", "大暑三秋近，林间一叶飞。", "桂轮开子夜，萤火照空城。"],
            "立秋": ["乳鸦啼散玉屏空，一枕新凉一扇风。", "睡起秋色向晚，一叶落而知立秋。", "伏中余热尚徘徊，立秋新凉已渐来。"],
            "处暑": ["离离暑云散，袅袅凉风起。", "处暑无三日，新凉直万金。", "四时俱可喜，最好新秋时.。"],
            "白露": ["露从今夜白，月是故乡明。", "蒹葭苍苍，白露为霜。", "庭前木叶飘零尽，唯有金风送白露。"],
            "秋分": ["漏钟仍夜浅，时节正秋分。", "燕将明日去，秋向此时分。", "金气秋分，风清露冷。"],
            "寒露": ["袅袅凉风动，凄凄寒露零。", "寒露惊秋晚，朝看菊渐黄。", "昨夜清霜冷，今朝寒露浓。"],
            "霜降": ["气肃霜降，露凝为霜。", "停车坐爱枫林晚，霜叶红于二月花。", "楼台侧畔杨柳疏，霜降时节感岁除。"],
            "立冬": ["细雨生微澜，立冬初过晚。", "冻笔新诗懒写，寒炉美酒时温。", "昨夜清霜冷，今朝立冬初.。"],
            "小雪": ["晚来天欲雪，能饮一杯无？", "小雪气寒而将雪，地寒未甚而滞。", "荷尽已无擎雨盖，菊残犹有傲霜枝。"],
            "大雪": ["忽如一夜春风来，千树万树梨花开。", "大雪满弓刀，何处望乡关。", "孤舟蓑笠翁，独钓寒江雪。"],
            "冬至": ["天时人事日相催，冬至阳生春又来。", "家家捣米做汤圆，知是冬至岁已寒。", "邯郸驿里逢冬至，抱膝灯前影伴身。"],
            "小寒": ["莫怪严凝切，春归向此时。", "小寒连大寒，准备过新年。", "寒夜客来茶当酒，竹炉汤沸火初红。"],
            "大寒": ["大寒宜近火，无事莫离家。", "心到大寒常觉暖，身处闹市亦清幽。", "岁序已云殚，大寒气森冽。"]
        };

        const seasonColors = ["#A8B892", "#EED886", "#D69A6B", "#8EA4B8"];

        function interpolateColor(color1, color2, factor) {
            const r1 = parseInt(color1.substring(1, 3), 16), g1 = parseInt(color1.substring(3, 5), 16), b1 = parseInt(color1.substring(5, 7), 16);
            const r2 = parseInt(color2.substring(1, 3), 16), g2 = parseInt(color2.substring(3, 5), 16), b2 = parseInt(color2.substring(5, 7), 16);
            const r = Math.round(r1 + factor * (r2 - r1)), g = Math.round(g1 + factor * (g2 - g1)), b = Math.round(b1 + factor * (b2 - b1));
            return `#${r.toString(16).padStart(2, '0')}${g.toString(16).padStart(2, '0')}${b.toString(16).padStart(2, '0')}`;
        }

        function renderCalendar(year, month, today) {
            const grid = document.getElementById('calendar-days');
            const dayDivs = grid.querySelectorAll('.day');
            dayDivs.forEach(d => d.remove());
            document.getElementById('display-month').textContent = (month + 1) + "月";
            document.getElementById('display-year').textContent = year + "年";
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            let offset = firstDay === 0 ? 6 : firstDay - 1;
            for(let i=0; i<offset; i++) grid.appendChild(document.createElement('div'));
            for(let d=1; d<=daysInMonth; d++) {
                const dayDiv = document.createElement('div');
                dayDiv.className = 'day';
                if(d === today) dayDiv.classList.add('today');
                const term = solarTerms.find(t => t.m === month && t.d === d);
                if(term) {
                    dayDiv.classList.add('is-term');
                    dayDiv.innerHTML = `${d}<span class="term-label-cal">${term.name}</span>`;
                } else { dayDiv.textContent = d; }
                grid.appendChild(dayDiv);
            }
        }

        let currentActiveTerm = null;

        function initWheel() {
            const sectorsContainer = document.getElementById('sectors-container');
            const labelsContainer = document.getElementById('labels-container');
            const poetryDisplay = document.getElementById('poetry-display');
            sectorsContainer.innerHTML = ''; labelsContainer.innerHTML = '';
            
            const CX = 200, CY = 200, INNER_R = 98, OUTER_R = 155, MOVE_DIST = 8;
            const step = 360 / 24;
            const containerWidth = document.querySelector('.wheel-container').getBoundingClientRect().width;
            const scale = containerWidth / 400;

            solarTerms.forEach((term, i) => {
                const seasonIndex = Math.floor(i / 6);
                const nextSeasonIndex = (seasonIndex + 1) % 4;
                const factor = (i % 6) / 6;
                const termColor = interpolateColor(seasonColors[seasonIndex], seasonColors[nextSeasonIndex], factor);

                const startAngle = i * step - 90 - (step/2);
                const endAngle = (i + 1) * step - 90 - (step/2);
                const midAngle = (startAngle + endAngle) / 2;
                const midRad = midAngle * Math.PI / 180;

                const r1 = startAngle * Math.PI / 180;
                const r2 = endAngle * Math.PI / 180;
                const x1 = CX + OUTER_R * Math.cos(r1), y1 = CY + OUTER_R * Math.sin(r1);
                const x2 = CX + OUTER_R * Math.cos(r2), y2 = CY + OUTER_R * Math.sin(r2);
                const x3 = CX + INNER_R * Math.cos(r2), y3 = CY + INNER_R * Math.sin(r2);
                const x4 = CX + INNER_R * Math.cos(r1), y4 = CY + INNER_R * Math.sin(r1);

                const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                const d = `M ${x1} ${y1} A ${OUTER_R} ${OUTER_R} 0 0 1 ${x2} ${y2} L ${x3} ${y3} A ${INNER_R} ${INNER_R} 0 0 0 ${x4} ${y4} Z`;
                
                path.setAttribute("d", d);
                path.setAttribute("fill", termColor);
                path.setAttribute("class", "term-sector");

                const textRadius = (INNER_R + OUTER_R) / 2;
                const label = document.createElement('div');
                label.className = 'term-label-wheel';
                const now = new Date();
                if (term.m === now.getMonth() && term.d === now.getDate()) label.classList.add('active-wheel');
                
                label.innerHTML = `<div class="term-name-wheel">${term.name}</div><div class="term-date-wheel">${term.m+1}/${term.d}</div>`;
                const labelX = (textRadius * Math.cos(midRad)) * scale;
                const labelY = (textRadius * Math.sin(midRad)) * scale;
                label.style.left = `calc(50% + ${labelX}px)`;
                label.style.top = `calc(50% + ${labelY}px)`;
                
                const handleJump = (e) => {
                    e.stopPropagation();
                    window.location.href = `src/${term.name}/${term.name}.html`;
                };

                path.onclick = handleJump;
                label.onclick = handleJump;

                const mx = MOVE_DIST * Math.cos(midRad), my = MOVE_DIST * Math.sin(midRad);
                
                const onOver = () => {
                    path.style.transform = `translate(${mx}px, ${my}px)`;
                    label.style.transform = `translate(calc(-50% + ${mx * scale}px), calc(-50% + ${my * scale}px)) scale(1.1)`;
                    
                    if (currentActiveTerm === term.name) return;
                    currentActiveTerm = term.name;

                    poetryDisplay.style.opacity = 0;
                    
                    setTimeout(() => {
                        if (currentActiveTerm === term.name) {
                            const poems = poetryData[term.name];
                            const randomPoem = poems[Math.floor(Math.random() * poems.length)];
                            poetryDisplay.textContent = randomPoem;
                            poetryDisplay.style.color = termColor;
                            poetryDisplay.style.opacity = 1;
                        }
                    }, 200); 
                };

                const onOut = () => {
                    path.style.transform = `translate(0, 0)`;
                    label.style.transform = `translate(-50%, -50%) scale(1)`;
                    
                    currentActiveTerm = null;
                    poetryDisplay.style.opacity = 0;
                };

                path.onmouseenter = onOver;
                path.onmouseleave = onOut;
                label.onmouseenter = onOver;
                label.onmouseleave = onOut;
                
                label.style.transform = `translate(-50%, -50%)`;
                sectorsContainer.appendChild(path);
                labelsContainer.appendChild(label);
            });
        }

        window.onload = () => {
            const now = new Date();
            renderCalendar(now.getFullYear(), now.getMonth(), now.getDate());
            initWheel();
        };

        window.onresize = () => {
            initWheel();
        };
    </script>
</body>
</html>
