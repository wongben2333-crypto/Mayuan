<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>二十四节气 - 雅致年轮月历</title>
    <style>
        :root {
            --color-primary: #97A87A;    
            --color-secondary: #A8BBA3;  
            --color-background: #FCF9EA; 
            --color-bg-dark: #F2EEDA;
            --color-accent: #FFA239;    
            --color-text-main: #FFFFFF; 
            --color-gray: #889670;
            --bg-decoration: #f8f6f0;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at 75% 50%, var(--color-background) 0%, var(--color-bg-dark) 100%);
            font-family: "PingFang SC", "Hiragino Sans GB", "STHeiti", 'STSong', 'SimSun', serif;
            display: flex;
            color: var(--color-primary);
            overflow: hidden;
        }

        /* --- 左侧面板：月历风格 (保留 wjj.html) --- */
        .left-panel {
            width: 38%;
            padding: 40px 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            z-index: 10;
        }

        .header h1 { font-size: 3rem; margin: 0; letter-spacing: 15px; font-weight: 300; }
        .header .subtitle { font-size: 0.9rem; letter-spacing: 4px; color: var(--color-secondary); margin-bottom: 40px; }

        .calendar-box {
            background: rgba(255, 255, 255, 0.4);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(151, 168, 122, 0.1);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        .cal-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--color-secondary);
            padding-bottom: 10px;
        }

        .cal-month { font-size: 1.8rem; font-weight: bold; }
        .cal-year { font-size: 1.2rem; opacity: 0.7; }

        .cal-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
            text-align: center;
        }

        .weekday { font-size: 0.8rem; font-weight: bold; color: var(--color-secondary); padding-bottom: 10px; }
        
        .day {
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 12px;
            font-size: 1.1rem;
            transition: all 0.3s;
            position: relative;
            background: rgba(255, 255, 255, 0.3);
        }

        .day.today { outline: 2px solid var(--color-primary); background: #fff; }
        .day.is-term {
            background-color: var(--color-accent) !important;
            color: white;
            box-shadow: 0 4px 10px rgba(255, 162, 57, 0.4);
        }

        .term-label-cal { font-size: 0.6rem; margin-top: 2px; position: absolute; bottom: 4px; }

        /* --- 右侧面板：年轮盘 (替换为 gjl.html 核心逻辑) --- */
        .right-panel {
            width: 62%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .wheel-container {
            position: relative;
            width: 90vmin;
            height: 90vmin;
            max-width: 800px;
            max-height: 800px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #wheel-svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 15px 30px rgba(0,0,0,0.08));
            overflow: visible;
        }

        .term-sector {
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            cursor: pointer;
            stroke: rgba(255,255,255,0.4);
            stroke-width: 0.5;
        }

        .term-label-wheel {
            position: absolute;
            pointer-events: none;
            text-align: center;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            z-index: 10;
            user-select: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 60px;
        }

        .term-name-wheel { 
            font-size: 1.8vmin; 
            font-weight: bold; 
            color: #4a4a4a; 
            margin-bottom: 2px;
        }
        .term-date-wheel { 
            font-size: 1.1vmin; 
            color: #7a7a7a; 
            font-family: 'Arial', sans-serif;
        }

        .active-wheel .term-name-wheel { color: #222; text-shadow: 0 0 1px rgba(0,0,0,0.2); }

        .center-group {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: #fff;
            width: 36vmin;
            height: 36vmin;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.02);
            pointer-events: none;
            border: 1px solid #f0eee8;
        }

        .center-title {
            font-size: 4.5vmin;
            color: #333;
            font-weight: bold;
            letter-spacing: 10px;
            margin-left: 10px;
        }

        .center-subtitle {
            font-size: 1.5vmin;
            color: #999;
            margin-top: 10px;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="left-panel">
        <div class="header">
            <h1>二十四节气</h1>
            <div class="subtitle">TIMELESS CALENDAR</div>
        </div>

        <div class="calendar-box">
            <div class="cal-header">
                <div class="cal-month" id="display-month">4月</div>
                <div class="cal-year" id="display-year">2026年</div>
            </div>
            <div class="cal-grid" id="calendar-days">
                <div class="weekday">一</div><div class="weekday">二</div><div class="weekday">三</div>
                <div class="weekday">四</div><div class="weekday">五</div><div class="weekday">六</div><div class="weekday">日</div>
            </div>
        </div>
    </div>

    <div class="right-panel">
        <div class="wheel-container">
            <svg id="wheel-svg" viewBox="0 0 400 400">
                <defs>
                    <filter id="softGrain" x="-50%" y="-50%" width="200%" height="200%">
                        <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="2" result="noise" />
                        <feDisplacementMap in="SourceGraphic" in2="noise" scale="1" />
                    </filter>
                </defs>
                <g id="sectors-container" filter="url(#softGrain)"></g>
            </svg>
            <div id="labels-container"></div>
            <div class="center-group">
                <div class="center-title">廿四节气</div>
                <div class="center-subtitle">2026 · 岁月流转</div>
            </div>
        </div>
    </div>

    <script>
        // 节气基础数据
        const solarTerms = [
            { name: '立春', m: 1, d: 4 }, { name: '雨水', m: 1, d: 18 }, { name: '惊蛰', m: 2, d: 5 },
            { name: '春分', m: 2, d: 20 }, { name: '清明', m: 3, d: 4 }, { name: '谷雨', m: 3, d: 20 },
            { name: '立夏', m: 4, d: 5 }, { name: '小满', m: 4, d: 20 }, { name: '芒种', m: 5, d: 5 },
            { name: '夏至', m: 5, d: 21 }, { name: '小暑', m: 6, d: 7 }, { name: '大暑', m: 6, d: 22 },
            { name: '立秋', m: 7, d: 7 }, { name: '处暑', m: 7, d: 23 }, { name: '白露', m: 8, d: 7 },
            { name: '秋分', m: 8, d: 22 }, { name: '寒露', m: 9, d: 8 }, { name: '霜降', m: 9, d: 23 },
            { name: '立冬', m: 10, d: 7 }, { name: '小雪', m: 10, d: 22 }, { name: '大雪', m: 11, d: 7 },
            { name: '冬至', m: 11, d: 21 }, { name: '小寒', m: 0, d: 5 }, { name: '大寒', m: 0, d: 20 }
        ];

        // 颜色配置 (来自 gjl.html)
        const seasonColors = ["#A8B892", "#EED886", "#D69A6B", "#8EA4B8"];

        function interpolateColor(color1, color2, factor) {
            const r1 = parseInt(color1.substring(1, 3), 16), g1 = parseInt(color1.substring(3, 5), 16), b1 = parseInt(color1.substring(5, 7), 16);
            const r2 = parseInt(color2.substring(1, 3), 16), g2 = parseInt(color2.substring(3, 5), 16), b2 = parseInt(color2.substring(5, 7), 16);
            const r = Math.round(r1 + factor * (r2 - r1)), g = Math.round(g1 + factor * (g2 - g1)), b = Math.round(b1 + factor * (b2 - b1));
            return `#${r.toString(16).padStart(2, '0')}${g.toString(16).padStart(2, '0')}${b.toString(16).padStart(2, '0')}`;
        }

        function renderCalendar(year, month, today) {
            document.getElementById('display-month').textContent = (month + 1) + "月";
            document.getElementById('display-year').textContent = year + "年";
            const grid = document.getElementById('calendar-days');
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            let offset = firstDay === 0 ? 6 : firstDay - 1;
            for(let i=0; i<offset; i++) grid.appendChild(document.createElement('div'));
            for(let d=1; d<=daysInMonth; d++) {
                const dayDiv = document.createElement('div');
                dayDiv.className = 'day';
                if(d === today) dayDiv.classList.add('today');
                const term = solarTerms.find(t => t.m === month && t.d === d);
                if(term) {
                    dayDiv.classList.add('is-term');
                    dayDiv.innerHTML = `${d}<span class="term-label-cal">${term.name}</span>`;
                } else { dayDiv.textContent = d; }
                grid.appendChild(dayDiv);
            }
        }

        function initWheel() {
            const sectorsContainer = document.getElementById('sectors-container');
            const labelsContainer = document.getElementById('labels-container');
            sectorsContainer.innerHTML = ''; labelsContainer.innerHTML = '';
            
            const CX = 200, CY = 200, INNER_R = 95, OUTER_R = 150, MOVE_DIST = 6;
            const step = 360 / 24;
            const scale = document.querySelector('.wheel-container').getBoundingClientRect().width / 400;

            solarTerms.forEach((term, i) => {
                const seasonIndex = Math.floor(i / 6);
                const nextSeasonIndex = (seasonIndex + 1) % 4;
                const factor = (i % 6) / 6;
                const termColor = interpolateColor(seasonColors[seasonIndex], seasonColors[nextSeasonIndex], factor);

                const startAngle = i * step - 90 - (step/2);
                const endAngle = (i + 1) * step - 90 - (step/2);
                const midAngle = (startAngle + endAngle) / 2;
                const midRad = midAngle * Math.PI / 180;

                // 绘制扇形
                const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                const r1 = startAngle * Math.PI / 180, r2 = endAngle * Math.PI / 180;
                const d = `M ${CX + OUTER_R * Math.cos(r1)} ${CY + OUTER_R * Math.sin(r1)} 
                           A ${OUTER_R} ${OUTER_R} 0 0 1 ${CX + OUTER_R * Math.cos(r2)} ${CY + OUTER_R * Math.sin(r2)} 
                           L ${CX + INNER_R * Math.cos(r2)} ${CY + INNER_R * Math.sin(r2)} 
                           A ${INNER_R} ${INNER_R} 0 0 0 ${CX + INNER_R * Math.cos(r1)} ${CY + INNER_R * Math.sin(r1)} Z`;
                path.setAttribute("d", d);
                path.setAttribute("fill", termColor);
                path.setAttribute("class", "term-sector");

                // 文字标签
                const textRadius = (INNER_R + OUTER_R) / 2;
                const label = document.createElement('div');
                label.className = 'term-label-wheel';
                const now = new Date();
                if (term.m === now.getMonth() && term.d === now.getDate()) label.classList.add('active-wheel');
                
                label.innerHTML = `<div class="term-name-wheel">${term.name}</div><div class="term-date-wheel">${term.m+1}/${term.d}</div>`;
                const labelX = (textRadius * Math.cos(midRad)) * scale;
                const labelY = (textRadius * Math.sin(midRad)) * scale;
                label.style.left = `calc(50% + ${labelX}px)`;
                label.style.top = `calc(50% + ${labelY}px)`;
                label.style.transform = `translate(-50%, -50%)`;

                // 交互
                const mx = MOVE_DIST * Math.cos(midRad), my = MOVE_DIST * Math.sin(midRad);
                path.onmouseenter = () => {
                    path.style.transform = `translate(${mx}px, ${my}px)`;
                    label.style.transform = `translate(calc(-50% + ${mx * scale}px), calc(-50% + ${my * scale}px)) scale(1.1)`;
                };
                path.onmouseleave = () => {
                    path.style.transform = `translate(0, 0)`;
                    label.style.transform = `translate(-50%, -50%) scale(1)`;
                };

                sectorsContainer.appendChild(path);
                labelsContainer.appendChild(label);
            });
        }

        window.onload = () => {
            const now = new Date();
            renderCalendar(now.getFullYear(), now.getMonth(), now.getDate());
            initWheel();
        };

        window.onresize = initWheel;
    </script>
</body>
</html>
