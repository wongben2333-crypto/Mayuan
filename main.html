<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>二十四节气作品展示</title>
    <style>
        :root {
            --color-primary: #97A87A;    
            --color-secondary: #A8BBA3;  
            --color-background-inner: #FCF9EA; 
            --color-background-outer: #F2EEDA;
            --color-accent: #FFA239;    
            --color-text-main: #FFFFFF; 
            --color-progress: rgba(151, 168, 122, 0.15); 
            --color-progress-fill: rgba(151, 168, 122, 0.5);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at 70% 50%, var(--color-background-inner) 0%, var(--color-background-outer) 100%);
            font-family: "PingFang SC", "STHeiti", sans-serif;
            display: flex;
            overflow: hidden;
            color: var(--color-primary);
        }

        /* 左侧信息面板 */
        .info-panel {
            width: 35%;
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            z-index: 10;
        }

        .header h1 { 
            font-size: 3.5rem; 
            margin: 0; 
            letter-spacing: 12px; 
            font-weight: 300; 
            line-height: 1.2;
        }
        
        .header .subtitle { 
            font-size: 1rem; 
            margin-top: 10px; 
            letter-spacing: 5px; 
            color: var(--color-secondary);
        }

        .date-display {
            margin-top: 50px;
            border-left: 3px solid var(--color-secondary);
            padding-left: 20px;
        }

        .current-date { font-size: 1.5rem; font-weight: bold; margin-bottom: 10px; }
        
        .countdown-item {
            margin-top: 15px;
            font-size: 0.95rem;
            color: #666;
        }

        .countdown-item span {
            color: var(--color-accent);
            font-weight: bold;
            font-size: 1.2rem;
            margin: 0 5px;
        }

        /* 右侧圆环容器 */
        .visual-panel {
            width: 65%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        #solar-term-wrapper {
            width: 90vmin; height: 90vmin;
            max-width: 850px; max-height: 850px;
        }

        svg { width: 100%; height: 100%; overflow: visible; }

        .term-group { cursor: pointer; transition: all 0.6s cubic-bezier(0.165, 0.84, 0.44, 1); }
        .term-path {
            fill: var(--color-secondary);
            stroke: var(--color-background-inner);
            stroke-width: 2;
            transition: fill 0.4s ease;
        }
        .term-group:hover .term-path { fill: var(--color-accent); }
        .term-group:hover { filter: drop-shadow(0 15px 30px rgba(0,0,0,0.1)); }

        .term-name { fill: var(--color-text-main); font-size: 18px; font-weight: 500; pointer-events: none; }
        .term-date { fill: rgba(255,255,255,0.7); font-size: 10px; pointer-events: none; }

        .progress-bg { fill: none; stroke: var(--color-progress); stroke-width: 6; }
        .progress-fill { 
            fill: none; 
            stroke: var(--color-progress-fill); 
            stroke-width: 8; 
            stroke-linecap: round;
            transition: stroke-dasharray 1.5s ease-in-out;
        }

        .center-label { fill: var(--color-primary); font-size: 12px; letter-spacing: 2px; opacity: 0.4; }
    </style>
</head>
<body>

    <div class="info-panel">
        <div class="header">
            <h1>二十四<br>节气</h1>
            <div class="subtitle">THE 24 SOLAR TERMS</div>
        </div>

        <div class="date-display">
            <div id="today-str" class="current-date">2026年04月13日</div>
            <div class="countdown-item">已过<span id="prev-term-name">-</span>：<span id="prev-days">-</span>天</div>
            <div class="countdown-item">距离<span id="next-term-name">-</span>：还剩<span><span id="next-days">-</span></span>天</div>
        </div>
    </div>

    <div class="visual-panel">
        <div id="solar-term-wrapper">
            <svg id="solar-svg" viewBox="0 0 1000 1000">
                <circle cx="500" cy="500" r="235" class="progress-bg" />
                <circle id="sync-progress" cx="500" cy="500" r="235" class="progress-fill" transform="rotate(-90 500 500)" />
                <text x="500" y="500" text-anchor="middle" class="center-label">岁时更迭 · 静待花开</text>
                <g id="main-container"></g>
            </svg>
        </div>
    </div>

    <script>
        // 2026年节气完整数据
        const solarData = [
            { name: "立春", m: 1, d: 4 }, { name: "雨水", m: 1, d: 18 },
            { name: "惊蛰", m: 2, d: 5 }, { name: "春分", m: 2, d: 20 },
            { name: "清明", m: 3, d: 4 }, { name: "谷雨", m: 3, d: 20 },
            { name: "立夏", m: 4, d: 5 }, { name: "小满", m: 4, d: 20 },
            { name: "芒种", m: 5, d: 5 }, { name: "夏至", m: 5, d: 21 },
            { name: "小暑", m: 6, d: 7 }, { name: "大暑", m: 6, d: 22 },
            { name: "立秋", m: 7, d: 7 }, { name: "处暑", m: 7, d: 23 },
            { name: "白露", m: 8, d: 7 }, { name: "秋分", m: 8, d: 22 },
            { name: "寒露", m: 9, d: 8 }, { name: "霜降", m: 9, d: 23 },
            { name: "立冬", m: 10, d: 7 }, { name: "小雪", m: 10, d: 22 },
            { name: "大雪", m: 11, d: 7 }, { name: "冬至", m: 11, d: 21 },
            { name: "小寒", m: 0, d: 5 }, { name: "大寒", m: 0, d: 20 }
        ];

        function init() {
            const container = document.getElementById('main-container');
            const centerX = 500, centerY = 500;
            const outerR = 470, innerR = 275; 
            const angleStep = 360 / 24;

            solarData.forEach((item, i) => {
                const startAngle = i * angleStep - 90 - (angleStep/2);
                const endAngle = (i + 1) * angleStep - 90 - (angleStep/2);
                const rad1 = startAngle * Math.PI / 180, rad2 = endAngle * Math.PI / 180;

                const x1 = centerX + outerR * Math.cos(rad1), y1 = centerY + outerR * Math.sin(rad1);
                const x2 = centerX + outerR * Math.cos(rad2), y2 = centerY + outerR * Math.sin(rad2);
                const x3 = centerX + innerR * Math.cos(rad2), y3 = centerY + innerR * Math.sin(rad2);
                const x4 = centerX + innerR * Math.cos(rad1), y4 = centerY + innerR * Math.sin(rad1);

                const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
                g.setAttribute("class", "term-group");

                const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                path.setAttribute("d", `M ${x1} ${y1} A ${outerR} ${outerR} 0 0 1 ${x2} ${y2} L ${x3} ${y3} A ${innerR} ${innerR} 0 0 0 ${x4} ${y4} Z`);
                path.setAttribute("class", "term-path");

                const midRad = (rad1 + rad2) / 2;
                const tx = centerX + (outerR + innerR) / 2 * Math.cos(midRad);
                const ty = centerY + (outerR + innerR) / 2 * Math.sin(midRad);

                const nameT = document.createElementNS("http://www.w3.org/2000/svg", "text");
                nameT.setAttribute("x", tx); nameT.setAttribute("y", ty - 8);
                nameT.setAttribute("text-anchor", "middle"); nameT.setAttribute("class", "term-name");
                nameT.textContent = item.name;

                const dateT = document.createElementNS("http://www.w3.org/2000/svg", "text");
                dateT.setAttribute("x", tx); dateT.setAttribute("y", ty + 15);
                dateT.setAttribute("text-anchor", "middle"); dateT.setAttribute("class", "term-date");
                dateT.textContent = `${(item.m+1).toString().padStart(2,'0')}/${item.d.toString().padStart(2,'0')}`;

                const mx = 22 * Math.cos(midRad), my = 22 * Math.sin(midRad);
                g.onmouseenter = () => g.style.transform = `translate(${mx}px, ${my}px)`;
                g.onmouseleave = () => g.style.transform = `translate(0, 0)`;

                g.appendChild(path); g.appendChild(nameT); g.appendChild(dateT);
                container.appendChild(g);
            });

            updateDisplay();
        }

        function updateDisplay() {
            const now = new Date();
            const currentYear = now.getFullYear();
            
            // 显示今天日期
            document.getElementById('today-str').textContent = `${currentYear}年${(now.getMonth()+1).toString().padStart(2,'0')}月${now.getDate().toString().padStart(2,'0')}日`;

            // 计算进度和倒计时
            let prevTerm, nextTerm;
            const dayTimes = solarData.map(d => new Date(currentYear, d.m, d.d).getTime());
            const nowTime = now.getTime();

            // 处理特殊跨年情况（如1月在大寒前）
            let nextIndex = dayTimes.findIndex(t => t > nowTime);
            if(nextIndex === -1) { // 如果今年节气都过了
                nextIndex = 0; 
                nextTerm = solarData[0];
                prevTerm = solarData[23];
            } else {
                nextTerm = solarData[nextIndex];
                prevTerm = solarData[nextIndex === 0 ? 23 : nextIndex - 1];
            }

            const nextDate = new Date(currentYear + (nextIndex === 0 && now.getMonth() === 11 ? 1 : 0), nextTerm.m, nextTerm.d);
            const prevDate = new Date(currentYear - (nextIndex === 0 && now.getMonth() <= 1 ? 1 : 0), prevTerm.m, prevTerm.d);

            const diffNext = Math.ceil((nextDate - now) / (1000*60*60*24));
            const diffPrev = Math.floor((now - prevDate) / (1000*60*60*24));

            document.getElementById('next-term-name').textContent = nextTerm.name;
            document.getElementById('next-days').textContent = diffNext;
            document.getElementById('prev-term-name').textContent = prevTerm.name;
            document.getElementById('prev-days').textContent = diffPrev;

            // 进度条渲染
            const circumference = 2 * Math.PI * 235;
            const startOfYear = new Date(currentYear, 0, 1);
            const percent = (now - startOfYear) / (1000*60*60*24*365);
            const progressFill = document.getElementById('sync-progress');
            progressFill.style.strokeDasharray = `${circumference} ${circumference}`;
            progressFill.style.strokeDashoffset = circumference - (percent * circumference);
        }

        window.onload = init;
    </script>
</body>
</html>
