<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026二十四节气年轮盘 - 雅致版</title>
    <style>
        :root {
            --bg-color: #f8f6f0;
        }

        body {
            font-family: 'STSong', 'SimSun', 'Noto Serif SC', serif;
            background: var(--bg-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            overflow: hidden;
        }

        /* 背景装饰 */
        body::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M11 18c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm48 25c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm-43-7c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm63 31c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3z' fill='%2397a87a' fill-opacity='0.03'/%3E%3C/svg%3E");
            z-index: -1;
        }

        .container {
            position: relative;
            width: 95vmin;
            height: 95vmin;
            max-width: 850px;
            max-height: 850px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #wheel-svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 15px 30px rgba(0,0,0,0.08));
            overflow: visible;
        }

        .term-sector {
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            cursor: pointer;
            stroke: rgba(255,255,255,0.4);
            stroke-width: 0.5;
        }

        .term-label {
            position: absolute;
            pointer-events: none;
            text-align: center;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            z-index: 10;
            user-select: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 60px; /* 限制宽度防止抖动 */
        }

        .term-name { 
            font-size: 1.8vmin; 
            font-weight: bold; 
            color: #4a4a4a; 
            margin-bottom: 2px;
        }
        .term-date { 
            font-size: 1.1vmin; 
            color: #7a7a7a; 
            font-family: 'Arial', sans-serif;
        }

        .active .term-name { 
            color: #222;
            text-shadow: 0 0 1px rgba(0,0,0,0.2);
        }

        .center-group {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: #fff;
            width: 38vmin;
            height: 38vmin;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.02);
            pointer-events: none;
            border: 1px solid #f0eee8;
        }

        .center-title {
            font-size: 4.8vmin;
            color: #333;
            font-weight: bold;
            letter-spacing: 10px;
            margin-left: 10px; /* 抵消字母间距带来的偏移 */
        }

        .center-subtitle {
            font-size: 1.6vmin;
            color: #999;
            margin-top: 10px;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

<div class="container">
    <svg id="wheel-svg" viewBox="0 0 400 400">
        <defs>
            <filter id="softGrain" x="-50%" y="-50%" width="200%" height="200%">
                <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="2" result="noise" />
                <feDisplacementMap in="SourceGraphic" in2="noise" scale="1" />
            </filter>
        </defs>
        <g id="sectors-container" filter="url(#softGrain)"></g>
    </svg>

    <div id="labels-container"></div>

    <div class="center-group">
        <div class="center-title">廿四节气</div>
        <div class="center-subtitle">2026 · 岁月流转</div>
    </div>
</div>

<script>
    /**
     * 颜色配置：低饱和度渐变
     * 顺序：立春、雨水...大寒
     */
    const seasonColors = [
        "#A8B892", // 春: 浅草绿
        "#EED886", // 夏: 槐花黄
        "#D69A6B", // 秋: 赭石
        "#8EA4B8"  // 冬: 霜天蓝
    ];

    const solarTermsData = [
        { name: '立春', date: '2/4' }, { name: '雨水', date: '2/18' }, { name: '惊蛰', date: '3/5' },
        { name: '春分', date: '3/20' }, { name: '清明', date: '4/4' }, { name: '谷雨', date: '4/20' },
        { name: '立夏', date: '5/5' }, { name: '小满', date: '5/20' }, { name: '芒种', date: '6/5' },
        { name: '夏至', date: '6/21' }, { name: '小暑', date: '7/7' }, { name: '大暑', date: '7/22' },
        { name: '立秋', date: '8/7' }, { name: '处暑', date: '8/23' }, { name: '白露', date: '9/7' },
        { name: '秋分', date: '9/23' }, { name: '寒露', date: '10/8' }, { name: '霜降', date: '10/23' },
        { name: '立冬', date: '11/7' }, { name: '小雪', date: '11/22' }, { name: '大雪', date: '12/7' },
        { name: '冬至', date: '12/21' }, { name: '小寒', date: '1/5' }, { name: '大寒', date: '1/20' }
    ];

    // 辅助函数：十六进制颜色插值实现平滑渐变
    function interpolateColor(color1, color2, factor) {
        const r1 = parseInt(color1.substring(1, 3), 16);
        const g1 = parseInt(color1.substring(3, 5), 16);
        const b1 = parseInt(color1.substring(5, 7), 16);
        const r2 = parseInt(color2.substring(1, 3), 16);
        const g2 = parseInt(color2.substring(3, 5), 16);
        const b2 = parseInt(color2.substring(5, 7), 16);
        const r = Math.round(r1 + factor * (r2 - r1));
        const g = Math.round(g1 + factor * (g2 - g1));
        const b = Math.round(b1 + factor * (b2 - b1));
        return `#${r.toString(16).padStart(2, '0')}${g.toString(16).padStart(2, '0')}${b.toString(16).padStart(2, '0')}`;
    }

    const sectorsContainer = document.getElementById('sectors-container');
    const labelsContainer = document.getElementById('labels-container');
    const CX = 200, CY = 200;
    const INNER_R = 95; // 进一步微调内径
    const OUTER_R = 150;
    const MOVE_DIST = 6; 

    function initWheel() {
        const step = 360 / 24;
        const scale = document.querySelector('.container').getBoundingClientRect().width / 400;

        solarTermsData.forEach((term, i) => {
            // 计算颜色渐变
            const seasonIndex = Math.floor(i / 6);
            const nextSeasonIndex = (seasonIndex + 1) % 4;
            const factor = (i % 6) / 6;
            const termColor = interpolateColor(seasonColors[seasonIndex], seasonColors[nextSeasonIndex], factor);

            const startAngle = i * step;
            const endAngle = (i + 1) * step;
            const midAngle = (startAngle + endAngle) / 2;
            const midRad = (midAngle - 90) * Math.PI / 180;

            // 1. 创建扇形
            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            const rad1 = (startAngle - 90) * Math.PI / 180, rad2 = (endAngle - 90) * Math.PI / 180;
            const d = `M ${CX + OUTER_R * Math.cos(rad1)} ${CY + OUTER_R * Math.sin(rad1)} 
                       A ${OUTER_R} ${OUTER_R} 0 0 1 ${CX + OUTER_R * Math.cos(rad2)} ${CY + OUTER_R * Math.sin(rad2)} 
                       L ${CX + INNER_R * Math.cos(rad2)} ${CY + INNER_R * Math.sin(rad2)} 
                       A ${INNER_R} ${INNER_R} 0 0 0 ${CX + INNER_R * Math.cos(rad1)} ${CY + INNER_R * Math.sin(rad1)} Z`;
            
            path.setAttribute("d", d);
            path.setAttribute("fill", termColor);
            path.setAttribute("class", "term-sector");
            
            // 2. 创建文字标签 (始终保持水平)
            const textRadius = (INNER_R + OUTER_R) / 2;
            const label = document.createElement('div');
            label.className = 'term-label';
            
            // 判断是否为今日
            const now = new Date();
            if (term.date === `${now.getMonth() + 1}/${now.getDate()}`) label.classList.add('active');
            
            label.innerHTML = `<div class="term-name">${term.name}</div><div class="term-date">${term.date}</div>`;
            
            const labelX = (textRadius * Math.cos(midRad)) * scale;
            const labelY = (textRadius * Math.sin(midRad)) * scale;
            label.style.left = `calc(50% + ${labelX}px)`;
            label.style.top = `calc(50% + ${labelY}px)`;
            label.style.transform = `translate(-50%, -50%)`; // 移除旋转，保持水平

            // 交互逻辑
            const mx = MOVE_DIST * Math.cos(midRad);
            const my = MOVE_DIST * Math.sin(midRad);

            const onEnter = () => {
                path.style.transform = `translate(${mx}px, ${my}px)`;
                label.style.transform = `translate(calc(-50% + ${mx * scale}px), calc(-50% + ${my * scale}px)) scale(1.1)`;
            };
            const onLeave = () => {
                path.style.transform = `translate(0, 0)`;
                label.style.transform = `translate(-50%, -50%) scale(1)`;
            };

            path.addEventListener('mouseenter', onEnter);
            path.addEventListener('mouseleave', onLeave);
            
            sectorsContainer.appendChild(path);
            labelsContainer.appendChild(label);
        });
    }

    window.addEventListener('load', initWheel);
    window.addEventListener('resize', () => {
        labelsContainer.innerHTML = '';
        sectorsContainer.innerHTML = '';
        initWheel();
    });
</script>

</body>
</html>
